<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520" role="img" aria-label="ScenarioSeed command line demo">
  <rect width="960" height="520" rx="18" fill="#0f172a"/>
  <rect x="24" y="24" width="912" height="472" rx="12" fill="#111827" stroke="#334155"/>
  <circle cx="54" cy="54" r="7" fill="#ef4444"/>
  <circle cx="78" cy="54" r="7" fill="#f59e0b"/>
  <circle cx="102" cy="54" r="7" fill="#22c55e"/>
  <text x="132" y="60" fill="#94a3b8" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15">scenarioseed demo</text>

  <text x="48" y="108" fill="#38bdf8" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18">$ npx scenarioseed generate prisma/schema.prisma \</text>
  <text x="70" y="138" fill="#38bdf8" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18">--scenario "SaaS billing edge cases" --out ./scenarioseed</text>

  <text x="48" y="190" fill="#e5e7eb" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18">Generated 20 records across 4 scenarios.</text>
  <text x="48" y="220" fill="#e5e7eb" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18">Domain: saas</text>
  <text x="48" y="250" fill="#e5e7eb" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18">Output: ./scenarioseed</text>

  <rect x="48" y="286" width="864" height="144" rx="10" fill="#020617" stroke="#1e293b"/>
  <text x="72" y="324" fill="#a7f3d0" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="17">trial_expiring</text>
  <text x="260" y="324" fill="#e2e8f0" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="17">trial ends in 2 days</text>
  <text x="72" y="356" fill="#fde68a" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="17">past_due_enterprise</text>
  <text x="260" y="356" fill="#e2e8f0" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="17">failed invoice, expansion blocked</text>
  <text x="72" y="388" fill="#bfdbfe" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="17">usage_over_quota</text>
  <text x="260" y="388" fill="#e2e8f0" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="17">active workspace above limit</text>
  <text x="72" y="420" fill="#fecaca" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="17">canceled_winback</text>
  <text x="260" y="420" fill="#e2e8f0" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="17">canceled subscription with reason</text>

  <text x="48" y="466" fill="#94a3b8" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15">Faker creates fake fields. ScenarioSeed creates fake businesses.</text>
</svg>
